name: Compile Ghost ESP

on:
  pull_request:
  workflow_dispatch:
    inputs:
      buildType:
        description: "Select the build type"
        required: true
        type: choice
        options:
          - "build-only"
          - "prerelease"
          - "all"
        default: "build-only"
      releaseVersion:
        description: "Release tag (e.g. v1.7.2). Leave empty to auto-generate"
        required: false
        type: string
        default: ""
      releaseName:
        description: "Release name (e.g. 'Bug Fix Release'). Leave empty for auto-generated"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build for ${{ matrix.target.name }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - { name: "esp32-generic",          idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.default.esp32",                   zip_name: "esp32-generic.zip" }
          - { name: "esp32s2-generic",         idf_target: "esp32s2", sdkconfig_file: "configs/sdkconfig.default.esp32s2",                 zip_name: "esp32s2-generic.zip" }
          - { name: "esp32s3-generic",         idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.default.esp32s3",                 zip_name: "esp32s3-generic.zip" }
          - { name: "esp32c3-generic",         idf_target: "esp32c3", sdkconfig_file: "configs/sdkconfig.default.esp32c3",                 zip_name: "esp32c3-generic.zip" }
          - { name: "esp32c5-generic",         idf_target: "esp32c5", sdkconfig_file: "configs/sdkconfig.default.esp32c5",                 zip_name: "esp32c5-generic-v01.zip" }
          - { name: "esp32c6-generic",         idf_target: "esp32c6", sdkconfig_file: "configs/sdkconfig.default.esp32c6",                 zip_name: "esp32c6-generic.zip" }
          - { name: "Awok V5",                 idf_target: "esp32s2", sdkconfig_file: "configs/sdkconfig.default.esp32s2",                 zip_name: "esp32v5_awok.zip" }
          - { name: "ghostboard",              idf_target: "esp32c6", sdkconfig_file: "configs/sdkconfig.ghostboard",                      zip_name: "ghostboard.zip" }
          - { name: "MarauderV4_FlipperHub",   idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.marauderv4",                      zip_name: "MarauderV4_FlipperHub.zip" }
          - { name: "MarauderV6&AwokDual",     idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.marauderv6",                      zip_name: "MarauderV6_AwokDual.zip" }
          - { name: "AwokMini",                idf_target: "esp32s2", sdkconfig_file: "configs/sdkconfig.awokmini",                        zip_name: "AwokMini.zip" }
          - { name: "ESP32-S3-Cardputer",      idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.cardputer",                       zip_name: "ESP32-S3-Cardputer.zip" }
          - { name: "Heltec V3",               idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.heltecv3",                        zip_name: "HeltecV3.zip" }
          - { name: "CYD2USB",                 idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.CYD2USB",                         zip_name: "CYD2USB.zip" }
          - { name: "CYDMicroUSB",             idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.CYDMicroUSB",                     zip_name: "CYDMicroUSB.zip" }
          - { name: "CYDDualUSB",              idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.CYDDualUSB",                      zip_name: "CYDDualUSB.zip" }
          - { name: "CYD2USB2.4_Inch",         idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.CYD2USB2.4Inch",                  zip_name: "CYD2USB2.4Inch.zip" }
          - { name: "CYD2USB2.4_Inch_C",       idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.CYD2USB2.4Inch_C_Varient",        zip_name: "CYD2USB2.4Inch_C.zip" }
          - { name: "CYD2432S028R",            idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.CYD2432S028R",                    zip_name: "CYD2432S028R.zip" }
          - { name: "Waveshare_LCD",           idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.waveshare7inch",                  zip_name: "Waveshare_LCD.zip" }
          - { name: "Crowtech_LCD",            idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.crowtech7inch",                   zip_name: "Crowtech_LCD.zip" }
          - { name: "Sunton_LCD",              idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.sunton7inch",                     zip_name: "Sunton_LCD.zip" }
          - { name: "JC3248W535EN_LCD",        idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.JC3248W535EN",                    zip_name: "JC3248W535EN_LCD.zip" }
          - { name: "Flipper_JCMK_GPS",        idf_target: "esp32s2", sdkconfig_file: "configs/sdkconfig.flipper.jcmk_gps",               zip_name: "Flipper_JCMK_GPS.zip" }
          - { name: "T-Deck",                  idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.tdeck",                           zip_name: "LilyGo-T-Deck.zip" }
          - { name: "TEmbedC1101",             idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.TEmbedC1101",                     zip_name: "LilyGo-TEmbedC1101.zip" }
          - { name: "S3TWatch",                idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.S3TWatch",                        zip_name: "LilyGo-S3TWatch-2020.zip" }
          - { name: "TDisplayS3-Touch",        idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.TDisplayS3-Touch",               zip_name: "LilyGo-TDisplayS3-Touch.zip" }
          - { name: "JCMK_DevBoardPro",        idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.JCMK_DevBoardPro",               zip_name: "JCMK_DevBoardPro.zip" }
          - { name: "RabbitLabs_Minion",       idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.minion",                         zip_name: "RabbitLabs_Minion.zip" }
          - { name: "Lolin_S3_Pro",            idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.lolins3pro",                     zip_name: "Lolin_S3_Pro.zip" }
          - { name: "Cardputer ADV",           idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.cardputeradv",                   zip_name: "CardputerADV.zip" }
          - { name: "Rabbit-Labs Poltergeist", idf_target: "esp32c5", sdkconfig_file: "configs/sdkconfig.poltergeist",                    zip_name: "Poltergeist.zip" }
          - { name: "Banshee C5",              idf_target: "esp32c5", sdkconfig_file: "configs/sdkconfig.somethingsomething",             zip_name: "Banshee_C5.zip" }
          - { name: "Banshee S3",              idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.somethingsomething2",            zip_name: "Banshee_S3.zip" }
          - { name: "FeberisPro",              idf_target: "esp32",   sdkconfig_file: "configs/sdkconfig.feberispro",                     zip_name: "FeberisPro.zip" }
          - { name: "ACE C5",                  idf_target: "esp32c5", sdkconfig_file: "configs/sdkconfig.ACE_C5",                         zip_name: "ACE_C5.zip" }
          - { name: "NM-CYD-C5",               idf_target: "esp32c5", sdkconfig_file: "configs/sdkconfig.NM-CYD-C5",                     zip_name: "NM-CYD-C5.zip" }
          - { name: "ACE S3",                  idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.ACE_S3",                         zip_name: "ACE_S3.zip" }
          - { name: "XIAO_S3_Sense",           idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.xiao_esp32s3_sense",              zip_name: "XIAO_S3_Sense.zip" }
          - { name: "XIAO_S3",                 idf_target: "esp32s3", sdkconfig_file: "configs/sdkconfig.xiao_esp32s3",                    zip_name: "XIAO_S3.zip" }
          - { name: "XIAO_C5",                 idf_target: "esp32c5", sdkconfig_file: "configs/sdkconfig.xiao_esp32c5",                    zip_name: "XIAO_C5.zip" }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/cache@v4
        id: cache-idf
        with:
          path: |
            ~/esp-idf
            ~/.espressif
          key: esp-idf-v6.0-${{ runner.os }}-v1
          restore-keys: |
            esp-idf-v6.0-${{ runner.os }}-

      - name: Install ESP-IDF Dependencies
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git flex bison gperf python3-pip python3-setuptools cmake ninja-build ccache libffi-dev libssl-dev dfu-util

      - name: Install ESP-IDF
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          git clone -b v6.0 --depth 1 --recursive https://github.com/espressif/esp-idf.git ~/esp-idf
          ~/esp-idf/install.sh

      - name: Apply Custom SDK Config
        run: |
          rm -f sdkconfig sdkconfig.defaults
          cp "${{ matrix.target.sdkconfig_file }}" sdkconfig.defaults
          cp "${{ matrix.target.sdkconfig_file }}" sdkconfig
          printf "\n# CONFIG_FATFS_USE_DYN_BUFFERS is not set\n" >> sdkconfig.defaults
          printf "\n# CONFIG_FATFS_USE_DYN_BUFFERS is not set\n" >> sdkconfig
          printf "\n# CONFIG_ESP_GDBSTUB_ENABLED is not set\n" >> sdkconfig.defaults
          printf "\n# CONFIG_ESP_GDBSTUB_ENABLED is not set\n" >> sdkconfig

      - name: Set up ESP-IDF Environment
        run: |
          . ~/esp-idf/export.sh
          export IDF_TARGET=${{ matrix.target.idf_target }}
          echo "IDF_TARGET=${{ matrix.target.idf_target }}" >> $GITHUB_ENV

      - name: Patch gdbstub Source
        run: |
          python3 -c "import os,pathlib; p=pathlib.Path(os.path.expanduser('~/esp-idf'))/'components/esp_gdbstub/src/gdbstub.c'; s=p.read_text(encoding='utf-8'); s=s.replace('#if (CONFIG_ESP_SYSTEM_GDBSTUB_RUNTIME || CONFIG_ESP_GDBSTUB_SUPPORT_TASKS)', '#if 1'); p.write_text(s, encoding='utf-8')"

      - name: Clean and Build Project
        env:
          SDKCONFIG_DEFAULTS: "sdkconfig.defaults"
        run: |
          . ~/esp-idf/export.sh
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          idf.py clean
          idf.py build || {
            echo "Build failed for ${{ matrix.target.name }}"
            exit 1
          }

      - name: Verify Bootloader Exists
        run: |
          BOOTLOADER_PATH="build/bootloader/bootloader.bin"
          if [ ! -f "$BOOTLOADER_PATH" ]; then
            echo "Error: Bootloader not found at $BOOTLOADER_PATH"
            exit 1
          fi
          echo "Bootloader found at $BOOTLOADER_PATH"

      - name: Package Artifacts into ZIP
        run: |
          . ~/esp-idf/export.sh
          ARTIFACT_DIR="packaged_artifacts_${{ matrix.target.name }}"
          ZIP_FILE="${{ matrix.target.zip_name }}"
          ELF_FILE="${ZIP_FILE%.zip}.elf"
          mkdir -p "$ARTIFACT_DIR"
          cp build/partition_table/partition-table.bin "$ARTIFACT_DIR/partitions.bin" || { echo "Failed to copy partition table"; exit 1; }
          cp build/bootloader/bootloader.bin "$ARTIFACT_DIR/bootloader.bin" || { echo "Failed to copy bootloader"; exit 1; }
          cp build/Ghost_ESP_IDF.bin "$ARTIFACT_DIR/firmware.bin" || { echo "Failed to copy app binary"; exit 1; }
          if [ -f build/Ghost_ESP_IDF.elf ]; then
            cp build/Ghost_ESP_IDF.elf "$ARTIFACT_DIR/$ELF_FILE" || { echo "Failed to copy app elf"; exit 1; }
          fi
          FLASH_SIZE=$(grep "CONFIG_ESPTOOLPY_FLASHSIZE=" sdkconfig.defaults | cut -d'"' -f2)
          FLASH_SIZE=${FLASH_SIZE:-4MB}
          python3 -m esptool --chip ${{ matrix.target.idf_target }} merge_bin \
            --output "$ARTIFACT_DIR/merged.bin" \
            --flash_mode dio \
            --flash_size "$FLASH_SIZE" \
            --target-offset 0x0 \
            0x1000 "$ARTIFACT_DIR/bootloader.bin" \
            0x8000 "$ARTIFACT_DIR/partitions.bin" \
            0x10000 "$ARTIFACT_DIR/firmware.bin" || { echo "Failed to create merged binary"; exit 1; }

          zip -j "$ZIP_FILE" "$ARTIFACT_DIR"/* || { echo "Failed to create ZIP $ZIP_FILE"; exit 1; }
          ls -lh "$ZIP_FILE"

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target.zip_name }}
          path: ${{ matrix.target.zip_name }}

  update_manifest_for_commit:
    name: Update Commit Manifest (push)
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.buildType != 'build-only'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_build_artifacts

      - name: Fetch current run artifact index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" > artifact_index.json

      - name: Update root manifest with commit configs
        run: |
          python3 - <<'PY'
          import glob
          import json
          import os
          from pathlib import Path
          from datetime import datetime, timezone

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          run_id = os.environ["GITHUB_RUN_ID"]
          now = datetime.now(timezone.utc).isoformat()

          path = "firmware-manifest.json"
          if os.path.isfile(path):
            with open(path, "r", encoding="utf-8") as fp:
              manifest = json.load(fp)
          else:
            manifest = {
              "schema_version": 2,
              "repository": repo,
              "generated_by": "compile_all.yml",
              "commits": {},
            }

          manifest["schema_version"] = 2
          manifest["repository"] = repo
          manifest["updated_at"] = now

          zips = sorted({os.path.basename(p) for p in glob.glob("all_build_artifacts/**/*.zip", recursive=True)})
          with open("artifact_index.json", "r", encoding="utf-8") as fp:
            artifact_index = json.load(fp)
          artifacts = artifact_index.get("artifacts", [])
          artifact_ids = {a.get("name"): a.get("id") for a in artifacts if a.get("name") and a.get("id")}

          items = []
          for zip_name in zips:
            artifact_name = f"artifact-{zip_name}"
            artifact_id = artifact_ids.get(artifact_name)
            download_url = None
            if artifact_id is not None:
              download_url = f"https://github.com/{repo}/actions/runs/{run_id}/artifacts/{artifact_id}"
            items.append({
              "config": Path(zip_name).stem,
              "zip_name": zip_name,
              "channel": "commit",
              "release_tag": None,
              "download_url": download_url,
              "artifact_run_url": f"https://github.com/{repo}/actions/runs/{run_id}",
            })

          commits = manifest.setdefault("commits", {})
          entry = commits.get(sha, {})
          refs = entry.get("release_refs", [])
          entry.update({
            "source_commit": sha,
            "last_channel": "commit",
            "last_tag": None,
            "updated_at": now,
            "configs": items,
            "release_refs": refs,
          })
          commits[sha] = entry

          with open(path, "w", encoding="utf-8") as fp:
            json.dump(manifest, fp, indent=2, sort_keys=True)
            fp.write("\n")
          PY

      - name: Commit root manifest
        env:
          BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git add firmware-manifest.json
          if git diff --cached --quiet; then
            echo "Manifest unchanged; no commit needed."
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Update firmware manifest for ${GITHUB_SHA::7} [skip ci]"
            git push origin "HEAD:${BRANCH}"
          fi

  upload_prerelease:
    name: Create Pre-release and Upload Artifacts
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'prerelease'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_build_artifacts

      - name: Verify and Prepare Artifacts for Upload
        run: |
          mkdir -p release_assets
          find all_build_artifacts -name '*.zip' -exec cp {} release_assets/ \;
          echo "Prepared release assets:"
          ls -lh release_assets

      - name: Generate Pre-release Tag and Title
        id: pre_release_info
        run: |
          if [ -n "${{ github.event.inputs.releaseVersion }}" ]; then
            TAG_NAME="${{ github.event.inputs.releaseVersion }}"
          else
            TAG_NAME="prerelease-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          fi

          if [ -n "${{ github.event.inputs.releaseName }}" ]; then
            TITLE="${{ github.event.inputs.releaseName }}"
          elif [ -n "${{ github.event.inputs.releaseVersion }}" ]; then
            TITLE="Release $TAG_NAME"
          else
            TITLE="Pre-release $(date +'%Y-%m-%d %H:%M:%S')"
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_title=$TITLE" >> $GITHUB_OUTPUT
          echo "Generated Tag: $TAG_NAME"
          echo "Generated Title: $TITLE"

      - name: Update Root Firmware Manifest
        env:
          TAG: ${{ steps.pre_release_info.outputs.tag_name }}
          CHANNEL: prerelease
        run: |
          python3 - <<'PY'
          import glob
          import json
          import os
          from pathlib import Path
          from datetime import datetime, timezone

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["TAG"]
          channel = os.environ["CHANNEL"]
          sha = os.environ["GITHUB_SHA"]
          now = datetime.now(timezone.utc).isoformat()

          path = "firmware-manifest.json"
          if os.path.isfile(path):
            with open(path, "r", encoding="utf-8") as fp:
              manifest = json.load(fp)
          else:
            manifest = {
              "schema_version": 2,
              "repository": repo,
              "generated_by": "compile_all.yml",
              "commits": {},
            }

          manifest["schema_version"] = 2
          manifest["repository"] = repo
          manifest["updated_at"] = now

          items = []
          for zip_path in sorted(glob.glob("release_assets/*.zip")):
            zip_name = os.path.basename(zip_path)
            stem = Path(zip_name).stem
            items.append({
              "config": stem,
              "zip_name": zip_name,
              "channel": channel,
              "release_tag": tag,
              "download_url": f"https://github.com/{repo}/releases/download/{tag}/{zip_name}",
            })

          commits = manifest.setdefault("commits", {})
          entry = commits.get(sha, {})
          refs = entry.get("release_refs", [])
          if not any(r.get("tag") == tag for r in refs):
            refs.append({"tag": tag, "channel": channel, "updated_at": now})

          entry.update({
            "source_commit": sha,
            "last_channel": channel,
            "last_tag": tag,
            "updated_at": now,
            "configs": items,
            "release_refs": refs,
          })
          commits[sha] = entry

          with open(path, "w", encoding="utf-8") as fp:
            json.dump(manifest, fp, indent=2, sort_keys=True)
            fp.write("\n")
          PY

      - name: Commit Root Manifest to Repository
        env:
          TAG: ${{ steps.pre_release_info.outputs.tag_name }}
          BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git add firmware-manifest.json
          if git diff --cached --quiet; then
            echo "Manifest unchanged; no commit needed."
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Update firmware manifest for ${TAG} [skip ci]"
            git push origin "HEAD:${BRANCH}"
          fi

      - name: Create GitHub Pre-Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.pre_release_info.outputs.tag_name }}
          TITLE: ${{ steps.pre_release_info.outputs.release_title }}
        run: |
          echo "Creating pre-release with tag $TAG and title '$TITLE'"
          cat > release_notes.md <<EOF
          Automated pre-release build for tag $TAG.

          Release: https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG
          Changelog: https://github.com/$GITHUB_REPOSITORY/blob/$TAG/CHANGELOG.md

          You can flash the bins with https://espressoflash.com/
          EOF
          if [ -z "$(ls -A release_assets/*.zip 2>/dev/null)" ]; then
            echo "No ZIP files found in release_assets. Creating pre-release without assets."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file release_notes.md \
              --prerelease
          else
            echo "Uploading assets from release_assets:"
            ls -l release_assets/*.zip
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file release_notes.md \
              --prerelease \
              release_assets/*.zip
          fi
          echo "Pre-release creation attempted."

  upload_release:
    name: Create Release and Upload Artifacts
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'all'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_build_artifacts

      - name: Verify and Prepare Artifacts for Upload
        run: |
          mkdir -p release_assets
          find all_build_artifacts -name '*.zip' -exec cp {} release_assets/ \;
          echo "Prepared release assets:"
          ls -lh release_assets

      - name: Generate Release Tag and Title
        id: release_info
        run: |
          if [ -n "${{ github.event.inputs.releaseVersion }}" ]; then
            TAG_NAME="${{ github.event.inputs.releaseVersion }}"
          else
            TAG_NAME="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          fi

          if [ -n "${{ github.event.inputs.releaseName }}" ]; then
            TITLE="${{ github.event.inputs.releaseName }}"
          elif [ -n "${{ github.event.inputs.releaseVersion }}" ]; then
            TITLE="Release $TAG_NAME"
          else
            TITLE="Release $(date +'%Y-%m-%d %H:%M:%S')"
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_title=$TITLE" >> $GITHUB_OUTPUT
          echo "Generated Tag: $TAG_NAME"
          echo "Generated Title: $TITLE"

      - name: Update Root Firmware Manifest
        env:
          TAG: ${{ steps.release_info.outputs.tag_name }}
          CHANNEL: stable
        run: |
          python3 - <<'PY'
          import glob
          import json
          import os
          from pathlib import Path
          from datetime import datetime, timezone

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["TAG"]
          channel = os.environ["CHANNEL"]
          sha = os.environ["GITHUB_SHA"]
          now = datetime.now(timezone.utc).isoformat()

          path = "firmware-manifest.json"
          if os.path.isfile(path):
            with open(path, "r", encoding="utf-8") as fp:
              manifest = json.load(fp)
          else:
            manifest = {
              "schema_version": 2,
              "repository": repo,
              "generated_by": "compile_all.yml",
              "commits": {},
            }

          manifest["schema_version"] = 2
          manifest["repository"] = repo
          manifest["updated_at"] = now

          items = []
          for zip_path in sorted(glob.glob("release_assets/*.zip")):
            zip_name = os.path.basename(zip_path)
            stem = Path(zip_name).stem
            items.append({
              "config": stem,
              "zip_name": zip_name,
              "channel": channel,
              "release_tag": tag,
              "download_url": f"https://github.com/{repo}/releases/download/{tag}/{zip_name}",
            })

          commits = manifest.setdefault("commits", {})
          entry = commits.get(sha, {})
          refs = entry.get("release_refs", [])
          if not any(r.get("tag") == tag for r in refs):
            refs.append({"tag": tag, "channel": channel, "updated_at": now})

          entry.update({
            "source_commit": sha,
            "last_channel": channel,
            "last_tag": tag,
            "updated_at": now,
            "configs": items,
            "release_refs": refs,
          })
          commits[sha] = entry

          with open(path, "w", encoding="utf-8") as fp:
            json.dump(manifest, fp, indent=2, sort_keys=True)
            fp.write("\n")
          PY

      - name: Commit Root Manifest to Repository
        env:
          TAG: ${{ steps.release_info.outputs.tag_name }}
          BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git add firmware-manifest.json
          if git diff --cached --quiet; then
            echo "Manifest unchanged; no commit needed."
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Update firmware manifest for ${TAG} [skip ci]"
            git push origin "HEAD:${BRANCH}"
          fi

      - name: Create GitHub Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_info.outputs.tag_name }}
          TITLE: ${{ steps.release_info.outputs.release_title }}
        run: |
          echo "Creating release with tag $TAG and title '$TITLE'"
          cat > release_notes.md <<EOF
          Automated release build for tag $TAG.

          Release: https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG
          Changelog: https://github.com/$GITHUB_REPOSITORY/blob/$TAG/CHANGELOG.md

          You can flash the bins with https://espressoflash.com/
          EOF
          if [ -z "$(ls -A release_assets/*.zip 2>/dev/null)" ]; then
            echo "No ZIP files found in release_assets. Creating release without assets."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file release_notes.md \
              --latest
          else
            echo "Uploading assets from release_assets:"
            ls -l release_assets/*.zip
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file release_notes.md \
              --latest \
              release_assets/*.zip
          fi
          echo "Release creation attempted."
