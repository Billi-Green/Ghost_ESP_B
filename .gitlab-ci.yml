        SDKCONFIG_FILE: "configs/sdkconfig.ghostboard"
        ZIP_NAME: "ghostboard.zip"
      - TARGET_NAME: "MarauderV4_FlipperHub"
        IDF_TARGET: "esp32"
        SDKCONFIG_FILE: "configs/sdkconfig.marauderv4"
        ZIP_NAME: "MarauderV4_FlipperHub.zip"
      - TARGET_NAME: "MarauderV6&AwokDual"
        IDF_TARGET: "esp32"
        SDKCONFIG_FILE: "configs/sdkconfig.marauderv6"
        ZIP_NAME: "MarauderV6_AwokDual.zip"
      - TARGET_NAME: "AwokMini"
        IDF_TARGET: "esp32s2"
        SDKCONFIG_FILE: "configs/sdkconfig.awokmini"
        ZIP_NAME: "AwokMini.zip"
      - TARGET_NAME: "ESP32-S3-Cardputer"
