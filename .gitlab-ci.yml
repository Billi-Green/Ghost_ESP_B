spec:
  inputs:
    buildType:
      description: "Select the build type"
      options:
        - "build-only"
        - "prerelease"
        - "all"
      default: "build-only"
    releaseVersion:
      description: "Release tag (e.g. v1.7.2). Leave empty to auto-generate"
      type: string
      default: ""
    releaseName:
      description: "Release name (e.g. 'Bug Fix Release'). Leave empty for auto-generated"
      type: string
      default: ""

---
stages:
  - build
  - manifest
  - release

workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - when: always

variables:
  IDF_DOCKER_TAG: "v6.0"
  R2_ENDPOINT: "https://2c8b11c572ea0e7bbc6ac6f5a87d81c8.r2.cloudflarestorage.com"
  R2_BUCKET: "ghostesp-releases"
  R2_CDN_URL: "https://cdn.arcdatabase.net"

build:
  stage: build
  image: espressif/idf:${IDF_DOCKER_TAG}
  before_script:
    - apt-get update && apt-get install -y zip software-properties-common gnupg
    - add-apt-repository -y ppa:deadsnakes/ppa
    - apt-get update && apt-get install -y python3.11 python3.11-venv python3.11-distutils
    - mkdir -p .ci-bin
    - ln -sf "$(command -v python3.11)" .ci-bin/python3
    - export PATH="$CI_PROJECT_DIR/.ci-bin:$PATH"
    - export IDF_PYTHON_ENV_PATH="$CI_PROJECT_DIR/.idf-python-env"
    - python3 --version
  parallel:
    matrix:
      - TARGET_NAME: "esp32-generic"
        IDF_TARGET: "esp32"
        SDKCONFIG_FILE: "configs/sdkconfig.default.esp32"
        ZIP_NAME: "esp32-generic.zip"
      - TARGET_NAME: "esp32s2-generic"
        IDF_TARGET: "esp32s2"
        SDKCONFIG_FILE: "configs/sdkconfig.default.esp32s2"
        ZIP_NAME: "esp32s2-generic.zip"
      - TARGET_NAME: "esp32s3-generic"
        IDF_TARGET: "esp32s3"
        SDKCONFIG_FILE: "configs/sdkconfig.default.esp32s3"
        ZIP_NAME: "esp32s3-generic.zip"
      - TARGET_NAME: "esp32c3-generic"
        IDF_TARGET: "esp32c3"
        SDKCONFIG_FILE: "configs/sdkconfig.default.esp32c3"
        ZIP_NAME: "esp32c3-generic.zip"
      - TARGET_NAME: "esp32c5-generic"
        IDF_TARGET: "esp32c5"
        SDKCONFIG_FILE: "configs/sdkconfig.default.esp32c5"
        ZIP_NAME: "esp32c5-generic-v01.zip"
      - TARGET_NAME: "esp32c6-generic"
        IDF_TARGET: "esp32c6"
