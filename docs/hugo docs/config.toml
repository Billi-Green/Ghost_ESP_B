baseURL = "/"
title = "GhostESP Documentation"
theme = "ghostesp"
defaultContentLanguage = "en"
canonifyURLs = false
enableRobotsTXT = true

[params]
  subtitle = ""

[params.versioning]
  default = "latest"

[[params.versioning.options]]
  id = "latest"
  name = "Latest"

[[params.versioning.options]]
  id = "v1.9.9"
  name = "v1.9.9"

[[params.versioning.options]]
  id = "v1.9.8"
  name = "v1.9.8"

[[params.versioning.options]]
  id = "v1.9.4"
  name = "v1.9.4"

[[params.versioning.options]]
  id = "v1.9.3"
  name = "v1.9.3"

[[params.versioning.options]]
  id = "v1.9"
  name = "v1.9"

[[params.versioning.options]]
  id = "v1.8.1"
  name = "v1.8.1"


[[params.versioning.options]]
  id = "v1.8"
  name = "v1.8"


[outputs]
  home = ["HTML", "JSON"]
  section = ["HTML", "JSON"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = "github-dark"

[[menu.sidebar]]
  name = "Overview"
  url = "/latest/"
  weight = 1

[[menu.sidebar]]
  name = "Getting Started"
  url = "/latest/getting-started/"
  weight = 2

[[menu.sidebar]]
  name = "Hardware Setup"
  url = "/latest/hardware/"
  weight = 3

[[menu.sidebar]]
  name = "Firmware"
  url = "/latest/firmware/"
  weight = 4

[[menu.sidebar]]
  name = "GPS & Wardriving"
  url = "/latest/gps/"
  weight = 5

[[menu.sidebar]]
  name = "Flipper Zero App"
  url = "/latest/flipper-app/"
  weight = 6

[[menu.sidebar]]
  name = "SubGHz"
  url = "/latest/subghz/"
  weight = 7
